<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    <linearGradient id="pinkGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8185A"/>
      <stop offset="100%" stop-color="#ff4d7a"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#40d4ff"/>
    </linearGradient>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Outer border glow -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="11" fill="none" stroke="#E8185A" stroke-width="0.8" opacity="0.6"/>
  <rect x="3" y="3" width="58" height="58" rx="10" fill="none" stroke="#00BFFF" stroke-width="0.4" opacity="0.4"/>

  <!-- Controller body shape -->
  <!-- Main body -->
  <rect x="10" y="22" width="44" height="22" rx="8" fill="#111E2A" stroke="#1A2E3B" stroke-width="0.8"/>

  <!-- Left grip -->
  <rect x="8" y="32" width="16" height="16" rx="7" fill="#111E2A" stroke="#1A2E3B" stroke-width="0.8"/>
  <!-- Right grip -->
  <rect x="40" y="32" width="16" height="16" rx="7" fill="#111E2A" stroke="#1A2E3B" stroke-width="0.8"/>

  <!-- D-PAD (left side) — cyan, like the logo -->
  <!-- Horizontal bar -->
  <rect x="15" y="29" width="10" height="4" rx="1" fill="url(#cyanGlow)" filter="url(#glow-cyan)"/>
  <!-- Vertical bar -->
  <rect x="18.5" y="25.5" width="4" height="11" rx="1" fill="url(#cyanGlow)" filter="url(#glow-cyan)"/>
  <!-- Center dot -->
  <rect x="19" y="30" width="3" height="3" rx="0.5" fill="#0D0D0D"/>

  <!-- ABXY Buttons (right side) — pink X in centre like logo -->
  <!-- Top button (up) -->
  <circle cx="46" cy="27" r="2.2" fill="#1A2E3B" stroke="#00BFFF" stroke-width="0.6"/>
  <text x="46" y="27.8" text-anchor="middle" font-family="Arial" font-size="3" font-weight="bold" fill="#00BFFF">▲</text>

  <!-- Left button -->
  <circle cx="42" cy="31" r="2.2" fill="#1A2E3B" stroke="#E8185A" stroke-width="0.6"/>
  <text x="42" y="31.8" text-anchor="middle" font-family="Arial" font-size="3.5" font-weight="bold" fill="#E8185A">◀</text>

  <!-- Right button -->
  <circle cx="50" cy="31" r="2.2" fill="#1A2E3B" stroke="#E8185A" stroke-width="0.6"/>
  <text x="50" y="31.8" text-anchor="middle" font-family="Arial" font-size="3.5" font-weight="bold" fill="#E8185A">▶</text>

  <!-- Bottom X button — pink, logo-style -->
  <circle cx="46" cy="35" r="2.5" fill="url(#pinkGlow)" filter="url(#glow-pink)"/>
  <!-- X mark inside -->
  <line x1="44.5" y1="33.5" x2="47.5" y2="36.5" stroke="#0D0D0D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="47.5" y1="33.5" x2="44.5" y2="36.5" stroke="#0D0D0D" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center buttons (Start / Select) -->
  <rect x="27" y="29.5" width="5" height="2.5" rx="1.2" fill="#1A2E3B" stroke="#4A7A8A" stroke-width="0.5"/>
  <rect x="33" y="29.5" width="5" height="2.5" rx="1.2" fill="#1A2E3B" stroke="#4A7A8A" stroke-width="0.5"/>

  <!-- Center logo mark — BLC initials tiny -->
  <text x="32" y="37" text-anchor="middle" font-family="Arial" font-size="4.5" font-weight="900" fill="none"
    stroke="#E8185A" stroke-width="0.3" letter-spacing="-0.5">BLC</text>
  <text x="32" y="37" text-anchor="middle" font-family="Arial" font-size="4.5" font-weight="900" fill="white" letter-spacing="-0.5">BLC</text>

  <!-- Analog stick indicators (small circles left/right grip) -->
  <circle cx="14" cy="40" r="4" fill="#0A1520" stroke="#1A2E3B" stroke-width="0.8"/>
  <circle cx="14" cy="40" r="2" fill="#152030" stroke="#00BFFF" stroke-width="0.4" opacity="0.7"/>

  <circle cx="50" cy="40" r="4" fill="#0A1520" stroke="#1A2E3B" stroke-width="0.8"/>
  <circle cx="50" cy="40" r="2" fill="#152030" stroke="#E8185A" stroke-width="0.4" opacity="0.7"/>

  <!-- Corner accent lines — cyber feel -->
  <line x1="4" y1="8" x2="12" y2="8" stroke="#E8185A" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="4" y1="8" x2="4" y2="16" stroke="#E8185A" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <line x1="60" y1="8" x2="52" y2="8" stroke="#00BFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="60" y1="8" x2="60" y2="16" stroke="#00BFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <line x1="4" y1="56" x2="12" y2="56" stroke="#00BFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="4" y1="56" x2="4" y2="48" stroke="#00BFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <line x1="60" y1="56" x2="52" y2="56" stroke="#E8185A" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="60" y1="56" x2="60" y2="48" stroke="#E8185A" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
</svg>
